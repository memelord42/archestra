name: Add Archestra banner to issues and PRs

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions: {}

concurrency:
  group: archestra-banner-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add-banner:
    name: Add Archestra banner
    runs-on: ubuntu-latest
    permissions:
      issues: write # edit issue body
      pull-requests: write # edit PR body
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.ARCHESTRA_CONTRIBUTOR_PR_BOT_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARCHESTRA_CONTRIBUTOR_PR_BOT_GITHUB_APP_PRIVATE_KEY }}

      - name: Append banner to body
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          MARKER='<!-- archestra-banner:v1 -->'

          BANNER=$'\n\n---\n<!-- archestra-banner:v1 -->\n<a href="https://archestra.ai/contributor-onboard" rel="nofollow noreferrer noopener" target="_blank">\n\n<img alt="Archestra Contributor" src="https://raw.githubusercontent.com/archestra-ai/archestra/main/docs/assets/archestra-contributor-banner.webp"/>\n\n</a>'

          # Fetch current body via API (avoids YAML/template injection from user-controlled body)
          CURRENT_BODY=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.body // ""')

          if printf '%s' "$CURRENT_BODY" | grep -qF "$MARKER"; then
            echo "Banner already present, skipping"
            exit 0
          fi

          # Build JSON payload safely with jq
          jq -n --arg body "${CURRENT_BODY}${BANNER}" '{body: $body}' > /tmp/payload.json

          gh api "repos/$REPO/issues/$ISSUE_NUMBER" \
            -X PATCH \
            --input /tmp/payload.json
